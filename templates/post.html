<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — {{site.title}}</title>
  <meta name="description" content="{{description}}">
  <meta name="author" content="Siddhesh Sonar">
  <link rel="canonical" href="{{site.url}}/{{slug}}/">
  <link rel="alternate" type="application/rss+xml" title="{{site.title}} RSS" href="{{site.url}}/rss.xml">

  <!-- Open Graph -->
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="{{site.url}}/{{slug}}/">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="{{site.title}}">
  <meta property="article:author" content="Siddhesh Sonar">
  <meta property="article:published_time" content="{{date}}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@Sonar_2377">
  <meta name="twitter:creator" content="@Sonar_2377">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">

  <!-- JSON-LD Article -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechArticle",
    "headline": "{{title}}",
    "description": "{{description}}",
    "datePublished": "{{date}}",
    "url": "{{site.url}}/{{slug}}/",
    "author": {
      "@type": "Person",
      "name": "Siddhesh Sonar",
      "jobTitle": "On-Device AI Engineer",
      "worksFor": { "@type": "Organization", "name": "RunAnywhere" },
      "url": "{{site.github}}"
    },
    "publisher": {
      "@type": "Person",
      "name": "Siddhesh Sonar"
    }
  }
  </script>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1a1a1a;
      --text: #e0e0e0;
      --text-secondary: #888;
      --accent: #3b82f6;
      --tag-bg: #1a1a2e;
      --tag-text: #7c8cf5;
      --code-bg: #161616;
      --code-border: #222;
      --max-width: 720px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 24px; }

    /* Nav */
    nav {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
    }
    nav a:hover { color: var(--accent); }

    /* Article header */
    .post-header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .post-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .post-meta {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .post-tags { margin-top: 8px; }
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      margin-right: 6px;
    }

    /* Article content */
    .content {
      padding-bottom: 60px;
    }
    .content h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 40px 0 16px;
      letter-spacing: -0.01em;
    }
    .content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 32px 0 12px;
    }
    .content p {
      margin-bottom: 16px;
      color: var(--text);
    }
    .content a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .content ul, .content ol {
      margin: 0 0 16px 24px;
    }
    .content li {
      margin-bottom: 6px;
    }
    .content strong {
      color: #fff;
      font-weight: 600;
    }
    .content code {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      font-size: 0.88em;
    }
    .content pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 8px;
      padding: 20px;
      overflow-x: auto;
      margin: 20px 0;
      line-height: 1.5;
    }
    .content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.88rem;
    }
    .content blockquote {
      border-left: 3px solid var(--accent-dim);
      padding-left: 16px;
      margin: 20px 0;
      color: var(--text-secondary);
      font-style: italic;
    }
    .content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 20px 0;
    }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    .content th, .content td {
      border: 1px solid var(--border);
      padding: 10px 14px;
      text-align: left;
    }
    .content th {
      background: var(--surface);
      font-weight: 600;
    }

    /* Footer */
    footer {
      padding: 32px 0;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .footer-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
    }
    .footer-links a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      .post-header h1 { font-size: 1.5rem; }
      .container { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/">← All Posts</a>
    </nav>

    <header class="post-header">
      <h1>{{title}}</h1>
      <p class="post-meta">{{dateFormatted}} · {{readingTime}} min read · Siddhesh Sonar</p>
      <div class="post-tags">{{tags}}</div>
    </header>

    <article class="content">
      {{content}}
    </article>

    <footer>
      <div class="footer-links">
        <a href="/">All Posts</a>
        <a href="{{site.github}}">GitHub</a>
        <a href="{{site.twitter}}">X/Twitter</a>
        <a href="{{site.linkedin}}">LinkedIn</a>
        <a href="/rss.xml">RSS</a>
      </div>
    </footer>
  </div>
</body>
</html>
