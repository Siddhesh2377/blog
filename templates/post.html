<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — {{site.title}}</title>
  <meta name="description" content="{{description}}">
  <meta name="author" content="Siddhesh Sonar">
  <meta name="google-site-verification" content="FJF4-0HvA3sZj23w5LWy33_4sL0YSPUz22yHPXn-q0Q" />
  <link rel="canonical" href="{{site.url}}/{{slug}}/">
  <link rel="alternate" type="application/rss+xml" title="{{site.title}} RSS" href="{{site.url}}/rss.xml">

  <!-- Open Graph -->
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="{{site.url}}/{{slug}}/">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="{{site.title}}">
  <meta property="article:author" content="Siddhesh Sonar">
  <meta property="article:published_time" content="{{date}}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@Sonar_2377">
  <meta name="twitter:creator" content="@Sonar_2377">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">

  <!-- JSON-LD Article -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechArticle",
    "headline": "{{title}}",
    "description": "{{description}}",
    "datePublished": "{{date}}",
    "url": "{{site.url}}/{{slug}}/",
    "author": {
      "@type": "Person",
      "name": "Siddhesh Sonar",
      "jobTitle": "On-Device AI Engineer",
      "worksFor": { "@type": "Organization", "name": "RunAnywhere" },
      "url": "{{site.github}}"
    },
    "publisher": {
      "@type": "Person",
      "name": "Siddhesh Sonar"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23c47a1a'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%23faf9f7' font-family='system-ui' font-weight='700'>S</text></svg>">

  <!-- Theme: apply saved preference before paint to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>

  <!-- Theme CSS -->
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" aria-label="Toggle dark mode" onclick="toggleTheme()">
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
  </button>

  <div class="container">
    <nav>
      <a href="/">← Back to all posts</a>
    </nav>

    <header class="post-header">
      <h1>{{title}}</h1>
      <p class="post-meta">
        <span>{{dateFormatted}}</span>
        <span class="sep">/</span>
        <span>{{readingTime}} min read</span>
        <span class="sep">/</span>
        <span>Siddhesh Sonar</span>
      </p>
      <div class="post-tags">{{tags}}</div>
    </header>

    <article class="content">
      {{content}}
    </article>

    <footer>
      <div class="footer-links">
        <a href="/">All Posts</a>
        <a href="{{site.github}}">GitHub</a>
        <a href="{{site.twitter}}">X/Twitter</a>
        <a href="{{site.linkedin}}">LinkedIn</a>
        <a href="/rss.xml">RSS</a>
      </div>
    </footer>
  </div>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }
  </script>
</body>
</html>
