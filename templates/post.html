<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — {{site.title}}</title>
  <meta name="description" content="{{description}}">
  <meta name="author" content="Siddhesh Sonar">
  <link rel="canonical" href="{{site.url}}/{{slug}}/">
  <link rel="alternate" type="application/rss+xml" title="{{site.title}} RSS" href="{{site.url}}/rss.xml">

  <!-- Open Graph -->
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="{{site.url}}/{{slug}}/">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="{{site.title}}">
  <meta property="article:author" content="Siddhesh Sonar">
  <meta property="article:published_time" content="{{date}}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@Sonar_2377">
  <meta name="twitter:creator" content="@Sonar_2377">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">

  <!-- JSON-LD Article -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechArticle",
    "headline": "{{title}}",
    "description": "{{description}}",
    "datePublished": "{{date}}",
    "url": "{{site.url}}/{{slug}}/",
    "author": {
      "@type": "Person",
      "name": "Siddhesh Sonar",
      "jobTitle": "On-Device AI Engineer",
      "worksFor": { "@type": "Organization", "name": "RunAnywhere" },
      "url": "{{site.github}}"
    },
    "publisher": {
      "@type": "Person",
      "name": "Siddhesh Sonar"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23e8a54b'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%23111110' font-family='system-ui' font-weight='700'>S</text></svg>">

  <style>
    :root {
      --bg: #111110;
      --surface: #1a1a18;
      --surface-raised: #222220;
      --border: #2a2a27;
      --border-subtle: #1f1f1d;
      --text: #eeece8;
      --text-secondary: #a09f98;
      --text-tertiary: #706f68;
      --accent: #e8a54b;
      --accent-dim: #b8842e;
      --accent-subtle: rgba(232, 165, 75, 0.1);
      --link: #e8a54b;
      --tag-bg: #1e1d1a;
      --tag-text: #c4a46a;
      --tag-border: #2e2d28;
      --code-bg: #161614;
      --code-border: #2a2a27;
      --code-text: #d4d2cc;
      --success: #6bc46d;
      --max-width: 700px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv11', 'ss01';
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 28px;
    }

    /* Nav */
    nav {
      padding: 28px 0;
    }
    nav a {
      color: var(--text-tertiary);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: color 0.2s ease;
    }
    nav a:hover { color: var(--accent); }

    /* Post Header */
    .post-header {
      padding: 56px 0 40px;
      margin-bottom: 40px;
    }
    .post-header h1 {
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.25;
      margin-bottom: 16px;
      color: #fff;
    }
    .post-meta {
      color: var(--text-tertiary);
      font-size: 0.88rem;
      font-weight: 400;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .post-meta .sep { color: var(--border); }
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 3px 12px;
      border-radius: 6px;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: 1px solid var(--tag-border);
      transition: all 0.2s ease;
    }

    /* ──────── Article Content ──────── */
    .content {
      padding-bottom: 64px;
      font-size: 1.02rem;
    }

    /* Headings */
    .content h2 {
      font-size: 1.45rem;
      font-weight: 700;
      margin: 52px 0 18px;
      letter-spacing: -0.02em;
      color: #fff;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 36px 0 14px;
      color: var(--text);
    }
    .content h4 {
      font-size: 1rem;
      font-weight: 600;
      margin: 28px 0 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.85rem;
    }

    /* Paragraphs */
    .content p {
      margin-bottom: 18px;
      color: var(--text);
      line-height: 1.85;
    }

    /* Links */
    .content a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 165, 75, 0.3);
      transition: border-color 0.2s ease;
    }
    .content a:hover {
      border-bottom-color: var(--accent);
    }

    /* Lists */
    .content ul, .content ol {
      margin: 0 0 20px 0;
      padding-left: 24px;
    }
    .content ul { list-style: none; padding-left: 0; }
    .content ul li {
      position: relative;
      padding-left: 20px;
      margin-bottom: 10px;
    }
    .content ul li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 11px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-dim);
    }
    .content ol li {
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .content ol li::marker {
      color: var(--accent-dim);
      font-weight: 600;
    }

    /* Bold & Italic */
    .content strong {
      color: #fff;
      font-weight: 600;
    }
    .content em {
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Inline code */
    .content code {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      padding: 2px 7px;
      border-radius: 5px;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      font-size: 0.85em;
      color: var(--accent);
      font-weight: 400;
    }

    /* Code blocks */
    .content pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 10px;
      padding: 22px 24px;
      overflow-x: auto;
      margin: 24px 0;
      line-height: 1.6;
      position: relative;
    }
    .content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.86rem;
      color: var(--code-text);
      font-weight: 400;
    }

    /* Blockquotes */
    .content blockquote {
      border-left: 3px solid var(--accent-dim);
      padding: 16px 20px;
      margin: 24px 0;
      background: var(--accent-subtle);
      border-radius: 0 8px 8px 0;
      color: var(--text-secondary);
      font-style: italic;
    }
    .content blockquote p {
      margin-bottom: 0;
      line-height: 1.7;
    }
    .content blockquote p + p {
      margin-top: 12px;
    }

    /* Images */
    .content img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin: 28px 0;
      border: 1px solid var(--border);
      display: block;
    }
    .content p > img {
      margin: 28px auto;
    }
    /* Image caption: use italic text after image */
    .content img + em,
    .content p:has(> img) + p > em:only-child {
      display: block;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.85rem;
      margin-top: -16px;
      margin-bottom: 24px;
    }

    /* Tables */
    .content table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 24px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .content thead {
      background: var(--surface-raised);
    }
    .content th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
    }
    .content td {
      padding: 11px 16px;
      text-align: left;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-subtle);
    }
    .content tr:last-child td {
      border-bottom: none;
    }
    .content tbody tr {
      transition: background 0.15s ease;
    }
    .content tbody tr:hover {
      background: var(--surface);
    }

    /* Horizontal rule */
    .content hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 48px 0;
    }

    /* Definition-like bold starts */
    .content p > strong:first-child {
      color: var(--accent);
    }

    /* ──────── Footer ──────── */
    footer {
      padding: 36px 0;
      border-top: 1px solid var(--border-subtle);
      color: var(--text-tertiary);
      font-size: 0.85rem;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--text-tertiary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .footer-links a:hover { color: var(--accent); }

    /* ──────── Scrollbar ──────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    /* ──────── Selection ──────── */
    ::selection {
      background: rgba(232, 165, 75, 0.25);
      color: #fff;
    }

    /* ──────── Mobile ──────── */
    @media (max-width: 640px) {
      .post-header h1 { font-size: 1.55rem; }
      .container { padding: 0 18px; }
      .content pre { padding: 16px 14px; border-radius: 8px; }
      .content table { font-size: 0.84rem; }
      .content th, .content td { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/">← Back to all posts</a>
    </nav>

    <header class="post-header">
      <h1>{{title}}</h1>
      <p class="post-meta">
        <span>{{dateFormatted}}</span>
        <span class="sep">/</span>
        <span>{{readingTime}} min read</span>
        <span class="sep">/</span>
        <span>Siddhesh Sonar</span>
      </p>
      <div class="post-tags">{{tags}}</div>
    </header>

    <article class="content">
      {{content}}
    </article>

    <footer>
      <div class="footer-links">
        <a href="/">All Posts</a>
        <a href="{{site.github}}">GitHub</a>
        <a href="{{site.twitter}}">X/Twitter</a>
        <a href="{{site.linkedin}}">LinkedIn</a>
        <a href="/rss.xml">RSS</a>
      </div>
    </footer>
  </div>
</body>
</html>
