<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{site.title}} — {{site.tagline}}</title>
  <meta name="description" content="Technical blog by Siddhesh Sonar on edge AI, on-device inference, llama.cpp, GGML, and mobile AI engineering. Building at RunAnywhere (YC W26). Creator of ToolNeuron.">
  <meta name="author" content="Siddhesh Sonar">
  <meta name="keywords" content="edge AI, on-device inference, llama.cpp, GGML, Android, mobile AI, quantization, Qualcomm, JNI, NDK, ToolNeuron, RunAnywhere">
  <link rel="canonical" href="{{site.url}}/">
  <link rel="alternate" type="application/rss+xml" title="{{site.title}} RSS" href="{{site.url}}/rss.xml">

  <!-- Open Graph -->
  <meta property="og:title" content="{{site.title}} — {{site.tagline}}">
  <meta property="og:description" content="Technical blog on edge AI, on-device inference, and mobile AI engineering.">
  <meta property="og:url" content="{{site.url}}/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{site.title}}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@Sonar_2377">
  <meta name="twitter:creator" content="@Sonar_2377">
  <meta name="twitter:title" content="{{site.title}} — {{site.tagline}}">
  <meta name="twitter:description" content="Technical blog on edge AI, on-device inference, and mobile AI engineering.">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "{{site.title}}",
    "description": "Technical blog on edge AI, on-device inference, llama.cpp, GGML, and mobile AI engineering",
    "url": "{{site.url}}",
    "author": {
      "@type": "Person",
      "name": "Siddhesh Sonar",
      "jobTitle": "On-Device AI Engineer",
      "worksFor": { "@type": "Organization", "name": "RunAnywhere" },
      "url": "{{site.github}}",
      "sameAs": [
        "{{site.twitter}}",
        "{{site.linkedin}}",
        "{{site.github}}"
      ]
    }
  }
  </script>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1a1a1a;
      --text: #e0e0e0;
      --text-secondary: #888;
      --accent: #3b82f6;
      --accent-dim: #1d4ed8;
      --tag-bg: #1a1a2e;
      --tag-text: #7c8cf5;
      --code-bg: #161616;
      --max-width: 720px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 24px; }

    /* Header */
    header {
      padding: 80px 0 48px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    header .tagline {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-bottom: 20px;
    }
    .links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .links a:hover { color: var(--accent); }

    /* Posts */
    .posts { padding: 40px 0 80px; }
    .post-card {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .post-card h2 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      transition: color 0.2s;
    }
    .post-card a:hover h2 { color: var(--accent); }
    .post-meta {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .post-description {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .post-tags { margin-top: 10px; }
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      margin-right: 6px;
    }

    /* Footer */
    footer {
      padding: 32px 0;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-align: center;
    }

    .empty-state {
      padding: 60px 0;
      text-align: center;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>{{site.title}}</h1>
      <p class="tagline">{{site.tagline}}</p>
      <div class="links">
        <a href="{{site.github}}">GitHub</a>
        <a href="{{site.twitter}}">X/Twitter</a>
        <a href="{{site.linkedin}}">LinkedIn</a>
        <a href="mailto:{{site.email}}">Email</a>
        <a href="/rss.xml">RSS</a>
      </div>
    </header>

    <section class="posts">
      {{posts}}
    </section>

    <footer>
      Siddhesh Sonar · On-Device AI Engineer · Building at RunAnywhere (YC W26) · Creator of ToolNeuron
    </footer>
  </div>
</body>
</html>
