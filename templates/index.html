<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{site.title}} — {{site.tagline}}</title>
  <meta name="description" content="Technical blog by Siddhesh Sonar on edge AI, on-device inference, llama.cpp, GGML, and mobile AI engineering. Building at RunAnywhere (YC W26). Creator of ToolNeuron.">
  <meta name="author" content="Siddhesh Sonar">
  <meta name="google-site-verification" content="FJF4-0HvA3sZj23w5LWy33_4sL0YSPUz22yHPXn-q0Q" />
  <meta name="keywords" content="edge AI, on-device inference, llama.cpp, GGML, Android, mobile AI, quantization, Qualcomm, JNI, NDK, ToolNeuron, RunAnywhere">
  <link rel="canonical" href="{{site.url}}/">
  <link rel="alternate" type="application/rss+xml" title="{{site.title}} RSS" href="{{site.url}}/rss.xml">

  <!-- Open Graph -->
  <meta property="og:title" content="{{site.title}} — {{site.tagline}}">
  <meta property="og:description" content="Technical blog on edge AI, on-device inference, and mobile AI engineering.">
  <meta property="og:url" content="{{site.url}}/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{site.title}}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@Sonar_2377">
  <meta name="twitter:creator" content="@Sonar_2377">
  <meta name="twitter:title" content="{{site.title}} — {{site.tagline}}">
  <meta name="twitter:description" content="Technical blog on edge AI, on-device inference, and mobile AI engineering.">

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "{{site.title}}",
    "description": "Technical blog on edge AI, on-device inference, llama.cpp, GGML, and mobile AI engineering",
    "url": "{{site.url}}",
    "author": {
      "@type": "Person",
      "name": "Siddhesh Sonar",
      "jobTitle": "On-Device AI Engineer",
      "worksFor": { "@type": "Organization", "name": "RunAnywhere" },
      "url": "{{site.github}}",
      "sameAs": ["{{site.twitter}}", "{{site.linkedin}}", "{{site.github}}"]
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23c47a1a'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%23faf9f7' font-family='system-ui' font-weight='700'>S</text></svg>">

  <!-- Theme: apply saved preference before paint to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>

  <!-- Theme CSS -->
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" aria-label="Toggle dark mode" onclick="toggleTheme()">
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
  </button>

  <div class="container">
    <header class="site-header">
      <div class="header-top">
        <div class="header-icon">
          <i data-lucide="cpu"></i>
        </div>
        <h1>{{site.title}}</h1>
      </div>
      <p class="tagline">{{site.tagline}}</p>
      <div class="links">
        <a href="{{site.github}}"><i data-lucide="github"></i> GitHub</a>
        <a href="{{site.twitter}}"><i data-lucide="twitter"></i> X/Twitter</a>
        <a href="{{site.linkedin}}"><i data-lucide="linkedin"></i> LinkedIn</a>
        <a href="mailto:{{site.email}}"><i data-lucide="mail"></i> Email</a>
        <a href="/rss.xml"><i data-lucide="rss"></i> RSS</a>
      </div>
    </header>

    <div class="divider"></div>

    <section class="posts">
      {{posts}}
    </section>

    <footer class="center">
      Siddhesh Sonar · On-Device AI Engineer · Building at RunAnywhere (YC W26) · Creator of ToolNeuron
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.lucide) lucide.createIcons();
    });
    function toggleTheme() {
      var html = document.documentElement;
      var isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }
  </script>
</body>
</html>
